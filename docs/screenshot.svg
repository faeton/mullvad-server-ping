<svg width="980" height="560" viewBox="0 0 980 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mullvad Server Ping terminal screenshot</title>
  <desc id="desc">A terminal window showing mullvad-server-ping ranking Mullvad WireGuard relays by latency.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7faf8"/>
      <stop offset="1" stop-color="#eaf4f0"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12221d"/>
      <stop offset="1" stop-color="#07100d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#123127" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="980" height="560" rx="0" fill="url(#bg)"/>

  <g transform="translate(88 72)" filter="url(#shadow)">
    <rect width="804" height="416" rx="14" fill="url(#terminal)"/>
    <rect width="804" height="44" rx="14" fill="#1d332c"/>
    <path d="M0 30h804v30H0z" fill="#1d332c"/>

    <circle cx="28" cy="22" r="6.5" fill="#ff6b5f"/>
    <circle cx="50" cy="22" r="6.5" fill="#f7c948"/>
    <circle cx="72" cy="22" r="6.5" fill="#36d399"/>

    <text x="402" y="28" text-anchor="middle" fill="#b8d8ce" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">mullvad-server-ping</text>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">
      <text x="36" y="86" fill="#8be9c7">$</text>
      <text x="62" y="86" fill="#f2fff9">mullvad-server-ping --type wireguard --active -l 5</text>

      <text x="36" y="136" fill="#6ee7b7">se-sto-wg-301</text>
      <text x="276" y="136" fill="#d7fff1">185.213.154.66</text>
      <text x="514" y="136" fill="#f8fafc">18.42 ms</text>

      <text x="36" y="178" fill="#6ee7b7">se-sto-wg-302</text>
      <text x="276" y="178" fill="#d7fff1">185.213.154.67</text>
      <text x="514" y="178" fill="#f8fafc">18.77 ms</text>

      <text x="36" y="220" fill="#6ee7b7">se-got-wg-001</text>
      <text x="276" y="220" fill="#d7fff1">193.138.218.130</text>
      <text x="514" y="220" fill="#f8fafc">22.14 ms</text>

      <text x="36" y="262" fill="#6ee7b7">de-fra-wg-401</text>
      <text x="276" y="262" fill="#d7fff1">146.70.117.2</text>
      <text x="514" y="262" fill="#f8fafc">29.80 ms</text>

      <text x="36" y="304" fill="#6ee7b7">nl-ams-wg-201</text>
      <text x="276" y="304" fill="#d7fff1">169.150.196.2</text>
      <text x="514" y="304" fill="#f8fafc">33.01 ms</text>
    </g>

    <rect x="36" y="344" width="732" height="1" fill="#29463d"/>
    <text x="36" y="382" fill="#8fb8ac" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">Live Mullvad relay API  |  stdlib-only Python  |  concurrent ICMP ranking</text>
  </g>
</svg>
